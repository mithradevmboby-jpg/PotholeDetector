<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Community Road Pothole Reporting System</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif
}
body{
background:#f4f4f4;
color:#222
}
header{
background:#1f2937;
color:#fff;
padding:15px;
text-align:center
}
.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px
}
.card{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1)
}
h2{
margin-bottom:15px
}
input,select,textarea,button{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px
}
button{
background:#2563eb;
color:#fff;
cursor:pointer;
border:none
}
button:hover{
background:#1d4ed8
}
#map{
height:400px;
border-radius:10px
}
.report{
padding:10px;
border-bottom:1px solid #ddd
}
.report img{
width:100%;
max-height:150px;
object-fit:cover;
margin-top:10px;
border-radius:5px
}
.vote{
background:#16a34a;
margin-top:10px
}
.status{
padding:5px 10px;
border-radius:20px;
font-size:12px;
color:#fff;
display:inline-block
}
.open{
background:#dc2626
}
.progress{
background:#f59e0b
}
.resolved{
background:#16a34a
}
canvas{
margin-top:20px
}
@media(max-width:768px){
.container{
grid-template-columns:1fr
}
}
</style>
</head>
<body>

<header>
<h1>Community Road Pothole Reporting System</h1>
<p>Report road damages and help improve your locality</p>
</header>

<div class="container">

<div class="card">
<h2>Report a Pothole</h2>
<form id="reportForm">
<input type="text" id="location" placeholder="Enter Location" required>
<select id="severity" required>
<option value="">Select Severity</option>
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
<select id="status">
<option>Open</option>
<option>In Progress</option>
<option>Resolved</option>
</select>
<input type="file" id="photo" accept="image/*">
<textarea id="description" placeholder="Describe the issue"></textarea>
<button type="submit">Submit Report</button>
</form>
</div>

<div class="card">
<h2>Pothole Map</h2>
<div id="map"></div>
</div>

<div class="card">
<h2>Reported Issues</h2>
<div id="reports"></div>
</div>

<div class="card">
<h2>Admin Dashboard</h2>
<canvas id="chart"></canvas>
</div>

</div>

<script>
const form=document.getElementById("reportForm")
const reportsDiv=document.getElementById("reports")
let reports=JSON.parse(localStorage.getItem("potholes"))||[]

const map=L.map("map").setView([9.5916,76.5222],13)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
attribution:"© OpenStreetMap"
}).addTo(map)

function saveReports(){
localStorage.setItem("potholes",JSON.stringify(reports))
}

function renderReports(){
reportsDiv.innerHTML=""
map.eachLayer(layer=>{
if(layer instanceof L.Marker)map.removeLayer(layer)
})

let open=0,progress=0,resolved=0

reports.forEach((r,index)=>{
const div=document.createElement("div")
div.className="report"

let statusClass="open"
if(r.status==="In Progress")statusClass="progress"
if(r.status==="Resolved")statusClass="resolved"

div.innerHTML=`
<h3>${r.location}</h3>
<p><b>Severity:</b> ${r.severity}</p>
<p>${r.description}</p>
<p class="status ${statusClass}">${r.status}</p>
<p><b>Votes:</b> ${r.votes}</p>
${r.photo?`<img src="${r.photo}">`:""}
<button class="vote" onclick="upvote(${index})">Upvote</button>
`

reportsDiv.appendChild(div)

const lat=9.5916+(Math.random()-0.5)/50
const lng=76.5222+(Math.random()-0.5)/50

L.marker([lat,lng]).addTo(map)
.bindPopup(`<b>${r.location}</b><br>${r.severity}`)

if(r.status==="Open")open++
else if(r.status==="In Progress")progress++
else resolved++
})

renderChart(open,progress,resolved)
}

function upvote(index){
reports[index].votes++
saveReports()
renderReports()
}

let chart

function renderChart(open,progress,resolved){
const ctx=document.getElementById("chart")

if(chart)chart.destroy()

chart=new Chart(ctx,{
type:"doughnut",
data:{
labels:["Open","In Progress","Resolved"],
datasets:[{
data:[open,progress,resolved],
backgroundColor:["#dc2626","#f59e0b","#16a34a"]
}]
}
})
}

form.addEventListener("submit",e=>{
e.preventDefault()

const file=document.getElementById("photo").files[0]

const reader=new FileReader()

reader.onload=function(){
const report={
location:document.getElementById("location").value,
severity:document.getElementById("severity").value,
status:document.getElementById("status").value,
description:document.getElementById("description").value,
photo:file?reader.result:"",
votes:0
}

reports.push(report)
saveReports()
renderReports()
form.reset()
}

if(file)reader.readAsDataURL(file)
else reader.onload()
})

renderReports()
</script>

</body>
</html>
